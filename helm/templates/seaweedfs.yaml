apiVersion: v1
kind: Secret
metadata:
  name: seaweedfs-credentials
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  APP_S3_ACCESS_KEY: {{ .Values.seaweedfs.credentials.accessKey | quote }}
  APP_S3_SECRET_KEY: {{ .Values.seaweedfs.credentials.secretKey | quote }}
  s3_config.json: |
    {
      "identities": [
        {
          "name": "iot-backend",
          "credentials": [
            {
              "accessKey": {{ .Values.seaweedfs.credentials.accessKey | quote }},
              "secretKey": {{ .Values.seaweedfs.credentials.secretKey | quote }}
            }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging"]
        }
      ]
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seaweedfs
  namespace: {{ .Values.namespace }}
spec:
  serviceName: seaweedfs
  replicas: {{ .Values.seaweedfs.replicas }}
  selector:
    matchLabels:
      app: seaweedfs
  template:
    metadata:
      labels:
        app: seaweedfs
    spec:
      containers:
        - name: seaweedfs
          image: "{{ .Values.seaweedfs.image }}:{{ .Values.seaweedfs.tag }}"
          args:
            - server
            - -dir=/data
            - -s3
            - -s3.port={{ .Values.seaweedfs.s3Port }}
            - -s3.config=/etc/seaweedfs/s3_config.json
            - -master.volumeSizeLimitMB=1024
          ports:
            - containerPort: {{ .Values.seaweedfs.s3Port }}
              name: s3
            - containerPort: 9333
              name: master
            - containerPort: 8888
              name: filer
          resources: {{- toYaml .Values.seaweedfs.resources | nindent 12 }}
          volumeMounts:
            - name: seaweedfs-data
              mountPath: /data
            - name: s3-config
              mountPath: /etc/seaweedfs
              readOnly: true
      volumes:
        - name: s3-config
          secret:
            secretName: seaweedfs-credentials
            items:
              - key: s3_config.json
                path: s3_config.json
  volumeClaimTemplates:
    - metadata:
        name: seaweedfs-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.seaweedfs.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: {{ .Values.namespace }}
spec:
  ports:
    - port: {{ .Values.seaweedfs.s3Port }}
      targetPort: {{ .Values.seaweedfs.s3Port }}
      name: s3
    - port: 9333
      targetPort: 9333
      name: master
    - port: 8888
      targetPort: 8888
      name: filer
  selector:
    app: seaweedfs
