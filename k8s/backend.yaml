apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: iot-monitoring
data:
  APP_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  APP_KAFKA_EVENTS_TOPIC: "sensor-events"
  APP_KAFKA_AGGREGATES_TOPIC: "sensor-aggregates"
  APP_KAFKA_ALERTS_TOPIC: "sensor-alerts"
  APP_S3_ENDPOINT: "http://seaweedfs:8333"
  APP_S3_BUCKET: "iot-lakehouse"
  APP_SIMULATOR_NUM_SENSORS: "20"
  APP_SIMULATOR_INTERVAL: "1.0"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: iot-monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: iot-monitoring/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: seaweedfs-credentials
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: iot-monitoring
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: backend
