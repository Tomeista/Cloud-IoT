# =============================================================================
# IoT Sensor Monitoring – Docker Compose (lokale Entwicklung)
# =============================================================================
# Start:   docker compose up -d --build
# Stop:    docker compose down
# Logs:    docker compose logs -f <service>
# =============================================================================

services:

  # ── Kafka (KRaft mode, kein Zookeeper nötig) ─────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "9094:9094"   # Host-Zugriff für lokale Entwicklung
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-kompatibler Objektspeicher) ────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Bucket Setup (einmalig)
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/warehouse --ignore-existing;
      mc mb myminio/checkpoints --ignore-existing;
      exit 0;
      "

  # ── Flink JobManager ────────────────────────────────────────────────────
  flink-jobmanager:
    build:
      context: ./flink-job
      dockerfile: Dockerfile
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        state.backend: hashmap
    ports:
      - "8081:8081"   # Flink Web UI
    depends_on:
      kafka:
        condition: service_healthy

  # ── Flink TaskManager ──────────────────────────────────────────────────
  flink-taskmanager:
    build:
      context: ./flink-job
      dockerfile: Dockerfile
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        state.backend: hashmap
    depends_on:
      - flink-jobmanager

  # ── Flink Job Submission ───────────────────────────────────────────────
  flink-job-submit:
    build:
      context: ./flink-job
      dockerfile: Dockerfile
    command: >
      bash -c "
        echo 'Waiting for Flink cluster...';
        sleep 15;
        /opt/flink/bin/flink run -m flink-jobmanager:8081 -py /opt/flink/job.py;
      "
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SENSOR_METADATA_PATH: /opt/flink/sensor_metadata.json
    depends_on:
      - flink-jobmanager
      - flink-taskmanager
      - kafka
    restart: on-failure

  # ── FastAPI Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy

  # ── Frontend (nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  kafka_data:
  minio_data:
