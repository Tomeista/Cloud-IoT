version: "3.9"

services:
  # --- Infrastructure ---

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OPTS: "-Djava.net.preferIPv6Addresses=true"
    volumes:
      - kafka-data:/var/lib/kafka/data

  seaweedfs:
    image: chrislusf/seaweedfs:3.80
    command: server -dir=/data -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3_config.json -master.volumeSizeLimitMB=1024
    ports:
      - "8333:8333" # S3 API
      - "9333:9333" # Master UI
      - "8888:8888" # Filer UI (bucket browser)
    volumes:
      - seaweedfs-data:/data
      - ./seaweedfs/s3_config.json:/etc/seaweedfs/s3_config.json:ro

  # --- Application ---

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_KAFKA_EVENTS_TOPIC: sensor-events
      APP_KAFKA_AGGREGATES_TOPIC: sensor-aggregates
      APP_KAFKA_ALERTS_TOPIC: sensor-alerts
      APP_S3_ENDPOINT: http://seaweedfs:8333
      APP_S3_ACCESS_KEY: seaweedadmin
      APP_S3_SECRET_KEY: seaweedadmin
      APP_S3_BUCKET: iot-lakehouse
    depends_on:
      - kafka
      - seaweedfs

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  # --- Stream Processing ---

  flink-jobmanager:
    build: ./flink-job
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: sensor-events
      KAFKA_AGGREGATES_TOPIC: sensor-aggregates
      KAFKA_ALERTS_TOPIC: sensor-alerts
      METADATA_PATH: /opt/flink/job/metadata.json
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
        rest.bind-address: ::
        env.java.opts: -Djava.net.preferIPv6Addresses=true
    depends_on:
      - kafka

  flink-taskmanager:
    build: ./flink-job
    command: taskmanager
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: sensor-events
      KAFKA_AGGREGATES_TOPIC: sensor-aggregates
      KAFKA_ALERTS_TOPIC: sensor-alerts
      METADATA_PATH: /opt/flink/job/metadata.json
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
        env.java.opts: -Djava.net.preferIPv6Addresses=true
    depends_on:
      - flink-jobmanager
    deploy:
      replicas: 2

volumes:
  zookeeper-data:
  kafka-data:
  seaweedfs-data:
